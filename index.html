<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 250px; background: #1e1e1e; color: white; padding: 20px; overflow-y: auto; }
    .sidebar h2 { margin-bottom: 15px; font-size: 18px; }
    .api-key-input { width: 100%; padding: 8px; margin-bottom: 10px; border: none; border-radius: 4px; }
    .btn { width: 100%; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
    .btn:hover { background: #0052a3; }
    .history-item { padding: 8px; margin-bottom: 5px; background: #2d2d2d; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .chat-container { flex: 1; display: flex; flex-direction: column; background: white; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
    .message { margin-bottom: 15px; }
    .message.user { text-align: right; }
    .message.user .content { background: #0066cc; color: white; display: inline-block; padding: 10px 15px; border-radius: 8px; max-width: 70%; }
    .message.assistant .content { background: #e0e0e0; display: inline-block; padding: 10px 15px; border-radius: 8px; max-width: 70%; }
    .chat-input { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    .chat-input button { padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .chat-input button:hover { background: #0052a3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>Settings</h2>
      <input type="password" id="apiKey" class="api-key-input" placeholder="Enter API Key">
      <button class="btn" onclick="clearChat()">Clear History</button>
      <h2 style="margin-top: 20px;">History</h2>
      <div id="historyList"></div>
    </div>
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Ask me anything..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById('messageInput').value;
      const apiKey = document.getElementById('apiKey').value;
      
      if (!message || !apiKey) {
        alert('Please enter a message and API key');
        return;
      }

      addMessage('user', message);
      document.getElementById('messageInput').value = '';

      const response = await window.electron.sendMessage(message, apiKey);
      addMessage('assistant', response);
    }

    function addMessage(role, content) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      messageEl.innerHTML = `<div class="content">${content}</div>`;
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function clearChat() {
      await window.electron.clearHistory();
      document.getElementById('chatMessages').innerHTML = '';
    }

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
